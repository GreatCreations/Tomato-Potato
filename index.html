<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meet Tomato Potato</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(170deg,#1a1430 0%,#2a1f4a 52%,#3c2a52 100%);
    font-family:'Quicksand',-apple-system,sans-serif;
    overflow:hidden;
    position:relative;
  }
  .orb{position:fixed;border-radius:50%;filter:blur(85px);opacity:0.22;pointer-events:none;}
  .orb1{top:-8%;left:-6%;width:520px;height:520px;background:radial-gradient(circle,#e8553e,transparent 68%);animation:float1 16s ease-in-out infinite;}
  .orb2{bottom:-14%;right:-8%;width:460px;height:460px;background:radial-gradient(circle,#e9b24a,transparent 68%);animation:float1 21s ease-in-out infinite reverse;}
  @keyframes float1{0%,100%{transform:translate(0,0)}33%{transform:translate(26px,-30px)}66%{transform:translate(-20px,18px)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .wrap{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:26px;text-align:center;padding:24px;}
  .emoji{font-size:54px;line-height:1;animation:bob 5s ease-in-out infinite;filter:drop-shadow(0 8px 20px rgba(0,0,0,0.4));}
  .btn{
    display:inline-flex;
    align-items:center;
    gap:12px;
    padding:20px 44px;
    border:none;
    border-radius:34px;
    background:linear-gradient(135deg,#e8553e,#b87333);
    color:#fff6ea;
    font-family:'Quicksand',sans-serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:0.4px;
    text-decoration:none;
    cursor:pointer;
    box-shadow:0 12px 34px rgba(232,85,62,0.42);
    transition:transform 0.18s ease, box-shadow 0.18s ease;
  }
  .btn:hover{transform:translateY(-3px);box-shadow:0 18px 46px rgba(232,85,62,0.58);}
  .btn:active{transform:translateY(-1px);}
  .sub{color:#9a8fb5;font-size:13px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;}
</style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="wrap">
    <div class="emoji">🍅🥔</div>
    <a class="btn" href="Tomato%20Potato%20(Strawberry).html">Meet Tomato Potato</a>
    <div class="sub">a cozy desk companion</div>
  </div>
</body>
</html>
